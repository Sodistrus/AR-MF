name: Contract and Runtime Quality Checks

on:
  workflow_dispatch:

concurrency:
  group: contract-runtime-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ecosystem-compatibility-checklist:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - name: Lint ecosystem memory + contract impact checklist
        run: python tools/ci/ecosystem_compatibility_check.py --check-pr-body

  contract-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ecosystem-compatibility-checklist
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: api_gateway/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api_gateway/requirements.txt
      - name: Validate schema contracts
        run: python tools/contracts/contract_checker.py --strict
      - name: Locale QA checks
        run: python tools/contracts/locale_qa.py

  runtime-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: ecosystem-compatibility-checklist
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            api_gateway/requirements.txt
            api_gateway/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api_gateway/requirements.txt
          pip install -r api_gateway/requirements-dev.txt
      - name: Pytest dependency smoke check (collect only)
        run: python -m pytest --collect-only -q api_gateway/test_api.py
      - name: Deterministic replay lockstep check
        run: python -m api_gateway.deterministic_replay --seed 777 --event-log tools/benchmarks/replay_event_log.sample.json --nodes 3
      - name: Latency perception benchmark
        run: python tools/benchmarks/latency_perception_benchmark.py --input tools/benchmarks/latency_samples.sample.json
      - name: Stage handoff latency benchmark
        run: python tools/benchmarks/stage_handoff_latency_benchmark.py
      - name: Creative stress scenarios
        run: python tools/benchmarks/creative_stress_scenarios.py
      - name: Runtime unit tests
        run: python -m unittest api_gateway.test_api api_gateway.test_aetherbus_extreme api_gateway.test_runtime_quality

  psycho-safety-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ecosystem-compatibility-checklist
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Runtime governor psycho-safety parity
        run: npx --yes tsx --test test_runtime_governor_psycho_safety.test.ts

  k8s-helm-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ecosystem-compatibility-checklist
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install Helm
        uses: azure/setup-helm@f0accbfd55e3332a28f721b8202b1016cecf90d5 # v5
      - name: Install regression check dependency
        run: python -m pip install --upgrade pip pyyaml
      - name: Helm dependency build
        run: helm dependency build charts/aetherium-manifest
      - name: Helm lint
        run: helm lint charts/aetherium-manifest
      - name: Helm template render validation
        run: helm template ci charts/aetherium-manifest > /tmp/aetherium-manifest.rendered.yaml
      - name: HPA defaults regression check
        run: python tools/ci/check_hpa_defaults.py
