name: Aetherium SDLC Automation

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      run_full_nightly:
        description: Run full fuzz/benchmark suite in this manual execution
        required: false
        default: false
        type: boolean
      run_aks_deploy:
        description: Run reusable AKS deployment (requires Azure secrets)
        required: false
        default: false
        type: boolean

concurrency:
  group: sdlc-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-fast-gate:
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/reusable-ci.yml
    with:
      fast-gate: true
      check-pr-body: true
      run-full-contracts: false

  continuous-ci:
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/reusable-ci.yml
    with:
      fast-gate: false
      check-pr-body: false
      run-full-contracts: false

  nightly-heavy:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_full_nightly) }}
    uses: ./.github/workflows/reusable-ci.yml
    with:
      fast-gate: false
      check-pr-body: false
      run-full-contracts: true

  manual-ci-default:
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.run_full_nightly }}
    uses: ./.github/workflows/reusable-ci.yml
    with:
      fast-gate: false
      check-pr-body: false
      run-full-contracts: false

  deploy-aks:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_aks_deploy }}
    uses: ./.github/workflows/reusable-deploy-aks.yml
    with:
      azure-container-registry: your-azure-container-registry
      container-name: your-container-name
      resource-group: your-resource-group
      cluster-name: your-cluster-name
      chart-path: your-chart-path
      chart-override-path: your-chart-override-path
    secrets: inherit
