name: Aetherium SDLC Automation

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: sdlc-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api_gateway/requirements.txt
          pip install ruff mypy
      - name: Lint (syntax + correctness rules)
        run: ruff check api_gateway tools --select E9,F63,F7,F82
      - name: Typecheck critical transport module
        run: mypy --ignore-missing-imports api_gateway/aetherbus_extreme.py

  ecosystem-compatibility-checklist:
    name: Ecosystem Compatibility Checklist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lint ecosystem memory + contract impact checklist
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python tools/ci/ecosystem_compatibility_check.py --check-pr-body
          else
            python tools/ci/ecosystem_compatibility_check.py
          fi

  contract-runtime-quality:
    name: Contracts + Runtime Quality
    runs-on: ubuntu-latest
    needs:
      - lint-and-typecheck
      - ecosystem-compatibility-checklist
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api_gateway/requirements.txt
      - name: Validate schema contracts
        run: python tools/contracts/contract_checker.py --strict
      - name: Locale QA checks
        run: python tools/contracts/locale_qa.py
      - name: Deterministic replay lockstep check
        run: python -m api_gateway.deterministic_replay --seed 777 --event-log tools/benchmarks/replay_event_log.sample.json --nodes 3
      - name: Runtime unit tests
        run: python -m unittest api_gateway.test_api api_gateway.test_aetherbus_extreme api_gateway.test_runtime_quality

  frontend-js-tests:
    name: Frontend JS Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Node test suite
        run: node --test tests/lcl_pipeline.test.js

  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: contract-runtime-quality
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api_gateway/requirements.txt
      - name: Latency perception benchmark
        run: python tools/benchmarks/latency_perception_benchmark.py --input tools/benchmarks/latency_samples.sample.json
      - name: Stage handoff latency benchmark
        run: python tools/benchmarks/stage_handoff_latency_benchmark.py
      - name: Runtime semantic benchmark
        run: python tools/benchmarks/runtime_semantic_benchmark.py --input tools/benchmarks/runtime_semantic_samples.sample.json
      - name: Creative stress scenarios
        run: python tools/benchmarks/creative_stress_scenarios.py

  docker-build-smoke:
    name: Container Build Smoke Test
    runs-on: ubuntu-latest
    needs: contract-runtime-quality
    steps:
      - uses: actions/checkout@v4
      - name: Build API gateway image
        run: docker build -t aetherium-gateway-ci -f api_gateway/Dockerfile api_gateway
