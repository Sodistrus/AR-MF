name: Reusable Contract Checks

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use for checks
        required: false
        type: string
        default: "3.11"
      check-pr-body:
        description: Enable PR-body compatibility validation
        required: false
        type: boolean
        default: false
      run-full:
        description: Run full fuzz and long benchmark suite
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  ecosystem-compatibility-checklist:
    name: Ecosystem Compatibility Checklist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Lint ecosystem memory + contract impact checklist
        run: |
          if [ "${{ inputs.check-pr-body }}" = "true" ]; then
            python tools/ci/ecosystem_compatibility_check.py --check-pr-body
          else
            python tools/ci/ecosystem_compatibility_check.py
          fi

  contract-runtime-smoke:
    name: Contract + Runtime Smoke Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ecosystem-compatibility-checklist
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: api_gateway/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api_gateway/requirements.txt
      - name: Validate schema contracts
        run: python tools/contracts/contract_checker.py --strict
      - name: Locale QA checks
        run: python tools/contracts/locale_qa.py
      - name: Deterministic replay lockstep check
        run: python -m api_gateway.deterministic_replay --seed 777 --event-log tools/benchmarks/replay_event_log.sample.json --nodes 3

  contract-runtime-full:
    name: Contract + Runtime Full Fuzz/Benchmarks
    if: ${{ inputs.run-full }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: contract-runtime-smoke
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: api_gateway/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api_gateway/requirements.txt
      - name: Runtime unit tests
        run: python -m unittest api_gateway.test_api api_gateway.test_aetherbus_extreme api_gateway.test_runtime_quality
      - name: Contract fuzzer (long)
        run: python tools/contracts/contract_fuzz.py
      - name: Runtime semantic benchmark (long)
        run: python tools/benchmarks/runtime_semantic_benchmark.py --input tools/benchmarks/runtime_semantic_samples.sample.json
      - name: Latency perception benchmark
        run: python tools/benchmarks/latency_perception_benchmark.py --input tools/benchmarks/latency_samples.sample.json
      - name: Stage handoff latency benchmark
        run: python tools/benchmarks/stage_handoff_latency_benchmark.py
      - name: Creative stress scenarios
        run: python tools/benchmarks/creative_stress_scenarios.py
