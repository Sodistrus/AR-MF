name: Reusable Deploy AKS

on:
  workflow_call:
    inputs:
      azure-container-registry:
        description: Azure Container Registry name (without .azurecr.io)
        required: true
        type: string
      container-name:
        description: Container/image name
        required: true
        type: string
      resource-group:
        description: Azure resource group
        required: true
        type: string
      cluster-name:
        description: AKS cluster name
        required: true
        type: string
      chart-path:
        description: Helm chart path
        required: true
        type: string
      chart-override-path:
        description: Helm override values file path
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  build-image:
    name: Build and push image to ACR
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Azure login
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build and push image to ACR
        run: |
          az acr build \
            --image ${{ inputs.azure-container-registry }}.azurecr.io/${{ inputs.container-name }}:${{ github.sha }} \
            --registry ${{ inputs.azure-container-registry }} \
            -g ${{ inputs.resource-group }} .

  deploy:
    name: Deploy to AKS via Helm
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [build-image]
    if: ${{ needs.build-image.result == 'success' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Azure login
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Set up kubelogin for non-interactive login
        uses: azure/use-kubelogin@76597ae0fcbaace21b05e13a2cbf8daee2c6e820 # v1
        with:
          kubelogin-version: v0.0.25
      - name: Get K8s context
        uses: azure/aks-set-context@5bdb70522845f81ca7d7bb7379668c992e4d3593 # v5
        with:
          resource-group: ${{ inputs.resource-group }}
          cluster-name: ${{ inputs.cluster-name }}
          admin: 'false'
          use-kubelogin: 'true'
      - name: Bake deployment
        id: bake
        uses: azure/k8s-bake@0909527dc3b0b8d0e4c0e73ca49389ba475c8902 # v3
        with:
          renderEngine: helm
          helmChart: ${{ inputs.chart-path }}
          overrideFiles: ${{ inputs.chart-override-path }}
          overrides: |
            replicas:2
          helm-version: latest
      - name: Deploy application
        uses: Azure/k8s-deploy@e84e0e29ee2acf291bb57dd0e8870dc0432e1627 # v5
        with:
          action: deploy
          manifests: ${{ steps.bake.outputs.manifestsBundle }}
          images: |
            ${{ inputs.azure-container-registry }}.azurecr.io/${{ inputs.container-name }}:${{ github.sha }}
