name: Reusable CI

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used by CI jobs
        required: false
        type: string
        default: "3.11"
      node-version:
        description: Node.js version used by frontend/TS jobs
        required: false
        type: string
        default: "20"
      fast-gate:
        description: Run PR fast gate only (smoke + critical checks)
        required: false
        type: boolean
        default: true
      check-pr-body:
        description: Enable PR-body compatibility validation
        required: false
        type: boolean
        default: false
      run-full-contracts:
        description: Run full contract fuzz/benchmark suite
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: api_gateway/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api_gateway/requirements.txt
          pip install ruff mypy
      - name: Lint (syntax + correctness rules)
        run: ruff check api_gateway tools --select E9,F63,F7,F82
      - name: Typecheck critical transport module
        run: mypy --ignore-missing-imports api_gateway/aetherbus_extreme.py

  contract-checks:
    name: Contract checks
    needs: lint-and-typecheck
    uses: ./.github/workflows/reusable-contract-checks.yml
    with:
      python-version: ${{ inputs.python-version }}
      check-pr-body: ${{ inputs.check-pr-body }}
      run-full: ${{ inputs.run-full-contracts }}

  psycho-safety-parity:
    name: Psycho-safety Parity (TS)
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Run governor psycho-safety parity test
        run: npx --yes tsx --test test_runtime_governor_psycho_safety.test.ts

  frontend-js-tests:
    name: Frontend JS Tests
    if: ${{ !inputs.fast-gate }}
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Run Node test suite
        run: node --test tests/lcl_pipeline.test.js

  k8s-helm-regression:
    name: K8s Helm Regression
    if: ${{ !inputs.fast-gate }}
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install Helm
        uses: azure/setup-helm@f0accbfd55e3332a28f721b8202b1016cecf90d5 # v5
      - name: Install regression check dependency
        run: python -m pip install --upgrade pip pyyaml
      - name: Helm dependency build
        run: helm dependency build charts/aetherium-manifest
      - name: Helm lint
        run: helm lint charts/aetherium-manifest
      - name: Helm template render validation
        run: helm template ci charts/aetherium-manifest > /tmp/aetherium-manifest.rendered.yaml
      - name: HPA defaults regression check
        run: python tools/ci/check_hpa_defaults.py

  docker-build-smoke:
    name: Container Build Smoke Test
    if: ${{ !inputs.fast-gate }}
    needs:
      - contract-checks
      - psycho-safety-parity
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build API gateway image
        run: docker build -t aetherium-gateway-ci -f api_gateway/Dockerfile api_gateway
