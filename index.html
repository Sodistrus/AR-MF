<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AETHERIUM Light UI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

    :root {
      --void-bg: #020204;
      --panel-bg: rgba(10, 10, 14, 0.78);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #eef2ff;
      --muted: #8b93a7;
      --cyan: #00e5ff;
      --pink: #ff3d81;
      --gold: #ffd166;
      --shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--void-bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }

    body {
      position: relative;
      user-select: none;
      touch-action: manipulation;
    }

    #display-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      background: radial-gradient(circle at 50% 42%, rgba(32, 41, 82, 0.18), transparent 40%), #020204;
    }

    /*
      memory-layer ยังเก็บไว้เพื่อใช้เป็น canvas ช่วยคอมไพล์ข้อความเป็น field ของอนุภาค
      แต่จะไม่แสดงผลให้ผู้ใช้เห็นโดยตรง
    */
    #memory-layer,
    #file-input {
      display: none;
    }

    .ambient-label {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      font-size: 10px;
      letter-spacing: 0.32em;
      color: rgba(255,255,255,0.42);
      text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(255,255,255,0.08);
    }

    .bottom-shell {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(to top, rgba(2,2,4,0.88), rgba(2,2,4,0.22) 60%, transparent);
      pointer-events: none;
    }

    .chat-bar {
      width: min(980px, 100%);
      margin: 0 auto;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 10px;
      pointer-events: auto;
    }

    .chat-top {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .icon-btn,
    .send-btn {
      border: 0;
      outline: none;
      appearance: none;
      cursor: pointer;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .icon-btn:hover,
    .send-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255,255,255,0.14);
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
    }

    .icon-btn svg,
    .send-btn svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .composer-wrap {
      flex: 1 1 auto;
      min-width: 0;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 10px 12px;
    }

    #chat-input {
      width: 100%;
      min-height: 24px;
      max-height: 120px;
      resize: none;
      overflow-y: auto;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      line-height: 1.45;
    }

    #chat-input::placeholder {
      color: var(--muted);
    }

    .chat-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      padding: 0 2px;
    }

    .status-line {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .action-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .send-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0,229,255,0.22), rgba(255,61,129,0.24));
      border-color: rgba(255,255,255,0.14);
      box-shadow: 0 0 22px rgba(0, 229, 255, 0.12);
    }

    .send-btn:hover {
      box-shadow: 0 0 28px rgba(255, 61, 129, 0.18);
    }

    .recording {
      border-color: rgba(255, 61, 129, 0.48) !important;
      background: rgba(255, 61, 129, 0.12) !important;
      box-shadow: 0 0 18px rgba(255, 61, 129, 0.22);
    }

    .file-chip {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      color: #dbe8ff;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .file-chip.active {
      display: flex;
    }

    .file-remove {
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      cursor: pointer;
      padding: 0;
    }

    @media (max-width: 640px) {
      .bottom-shell {
        padding-inline: 10px;
      }

      .chat-bar {
        border-radius: 20px;
        padding: 8px;
      }

      .icon-btn,
      .send-btn {
        width: 42px;
        height: 42px;
      }

      #chat-input {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <canvas id="display-layer"></canvas>
  <canvas id="memory-layer"></canvas>
  <input id="file-input" type="file" accept="image/*" />

  <div class="ambient-label">AETHERIUM</div>

  <div class="bottom-shell">
    <div class="chat-bar">
      <div class="chat-top">
        <button class="icon-btn" id="attach-btn" title="แนบไฟล์" aria-label="แนบไฟล์">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.48l10.6-10.61a4 4 0 0 1 5.66 5.66L8.7 18.12a2 2 0 1 1-2.83-2.83l9.2-9.19"/>
          </svg>
        </button>

        <div class="composer-wrap">
          <textarea id="chat-input" rows="1" placeholder="ส่งข้อความถึงแสง..."></textarea>
        </div>

        <button class="icon-btn" id="voice-btn" title="ข้อความเสียง" aria-label="ข้อความเสียง">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 15a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Z"/>
            <path d="M19 11a7 7 0 0 1-14 0"/>
            <path d="M12 18v4"/>
            <path d="M8 22h8"/>
          </svg>
        </button>

        <button class="send-btn" id="send-btn" title="ส่ง" aria-label="ส่ง">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2 11 13"/>
            <path d="M22 2 15 22l-4-9-9-4 20-7Z"/>
          </svg>
        </button>

        <button class="icon-btn" id="settings-btn" title="ตั้งค่า" aria-label="ตั้งค่า">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01A1.65 1.65 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
          </svg>
        </button>
      </div>

      <div class="file-chip" id="file-chip">
        <span id="file-name">ไม่มีไฟล์</span>
        <button class="file-remove" id="file-remove" type="button">ลบ</button>
      </div>

      <div class="chat-bottom">
        <div class="status-line" id="status-line">SPHERE STANDBY · แตะหน้าจอเพื่อปลุกแสง</div>
        <div class="action-row"></div>
      </div>
    </div>
  </div>

  <script>
    const display = document.getElementById('display-layer');
    const ctx = display.getContext('2d', { alpha: false });
    const memCanvas = document.getElementById('memory-layer');
    const memCtx = memCanvas.getContext('2d', { willReadFrequently: true });

    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const attachBtn = document.getElementById('attach-btn');
    const voiceBtn = document.getElementById('voice-btn');
    const settingsBtn = document.getElementById('settings-btn');
    const fileInput = document.getElementById('file-input');
    const fileChip = document.getElementById('file-chip');
    const fileNameEl = document.getElementById('file-name');
    const fileRemoveBtn = document.getElementById('file-remove');
    const statusLine = document.getElementById('status-line');

    let W = 0;
    let H = 0;
    let CX = 0;
    let CY = 0;
    let renderTime = 0;
    let selectedFile = null;
    let learnedImageMemory = null;
    let recording = false;
    let lastInteractionTime = performance.now();
    let fadingOut = false;
    let visibilityStrength = 1;
    let targetField = [];

    const NUM_PHOTONS = 2600;
    const PARTICLE_SPEED = 4.0;
    const IMAGE_MEMORY_TTL_MS = 60 * 60 * 1000;
    const photons = [];
    const touchBursts = [];

    const THEMES = {
      idle: { palette: ['#031b44', '#0b4fd9', '#00b7ff', '#d8f6ff'], force: 0.021, noise: 0.08, trail: 0.08 },
      sent: { palette: ['#00e5ff', '#ff3d81', '#ffd166'], force: 0.036, noise: 0.14, trail: 0.2 },
      voice: { palette: ['#ff3d81', '#ffd166', '#ffffff'], force: 0.03, noise: 0.16, trail: 0.16 }
    };
    let theme = 'idle';

    function setStatus(text) { statusLine.textContent = text; }
    function setTheme(nextTheme) { theme = nextTheme; }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function resize() {
      W = display.width = window.innerWidth;
      H = display.height = window.innerHeight;
      memCanvas.width = W;
      memCanvas.height = H;
      CX = W * 0.5;
      CY = H * 0.5;
    }

    function autoResizeTextarea() {
      chatInput.style.height = '24px';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    }

    function markInteraction(reasonText) {
      lastInteractionTime = performance.now();
      fadingOut = false;
      visibilityStrength = Math.min(1, visibilityStrength + 0.14);
      if (reasonText) setStatus(reasonText);
    }

    function initPhotons() {
      photons.length = 0;
      for (let i = 0; i < NUM_PHOTONS; i++) {
        photons.push({
          x: CX + (Math.random() - 0.5) * W * 0.25,
          y: CY + (Math.random() - 0.5) * H * 0.25,
          vx: (Math.random() - 0.5) * 0.8,
          vy: (Math.random() - 0.5) * 0.8
        });
      }
    }

    function hexToRgb(hex) {
      const v = hex.replace('#', '');
      const full = v.length === 3 ? v.split('').map(s => s + s).join('') : v;
      return [parseInt(full.slice(0, 2), 16), parseInt(full.slice(2, 4), 16), parseInt(full.slice(4, 6), 16)];
    }

    function paletteColor(t, palette) {
      const a = hexToRgb(palette[Math.floor(t * palette.length) % palette.length]);
      const b = hexToRgb(palette[(Math.floor(t * palette.length) + 1) % palette.length]);
      const m = (Math.sin(t * Math.PI * 2) + 1) * 0.5;
      return [a[0] + (b[0] - a[0]) * m, a[1] + (b[1] - a[1]) * m, a[2] + (b[2] - a[2]) * m];
    }

    function getStandbyTarget(index) {
      const t = index / NUM_PHOTONS;
      const angle = t * Math.PI * 16 + renderTime * 0.95;
      const radius = Math.min(W, H) * (0.05 + t * 0.3);
      return {
        x: CX + Math.cos(angle) * radius,
        y: CY + Math.sin(angle) * radius * 0.86,
        color: paletteColor(t, THEMES.idle.palette)
      };
    }

    function addTouchBurst(x, y) {
      touchBursts.push({ x, y, bornAt: renderTime, life: 1.15, strength: 1.2 });
      if (touchBursts.length > 6) touchBursts.shift();
    }

    function applyTouchBursts(photon) {
      let fx = 0;
      let fy = 0;
      for (const burst of touchBursts) {
        const age = renderTime - burst.bornAt;
        if (age > burst.life) continue;
        const dx = photon.x - burst.x;
        const dy = photon.y - burst.y;
        const dist = Math.hypot(dx, dy) || 1;
        const ageFactor = 1 - age / burst.life;
        const falloff = Math.max(0, 1 - dist / 170) * ageFactor * burst.strength;
        fx += (dx / dist) * falloff;
        fy += (dy / dist) * falloff;
      }
      return { fx, fy };
    }

    function pruneTouchBursts() {
      for (let i = touchBursts.length - 1; i >= 0; i--) {
        if (renderTime - touchBursts[i].bornAt > touchBursts[i].life) touchBursts.splice(i, 1);
      }
    }

    function buildMessageField(text) {
      const value = (text || '').trim();
      if (!value) {
        targetField = [];
        return;
      }
      memCtx.clearRect(0, 0, W, H);
      const fontSize = clamp(Math.floor(Math.min(W * 0.08, H * 0.14)), 34, 94);
      memCtx.fillStyle = '#fff';
      memCtx.textAlign = 'center';
      memCtx.textBaseline = 'middle';
      memCtx.font = `700 ${fontSize}px "JetBrains Mono", monospace`;
      memCtx.fillText(value.slice(0, 72), CX, CY);

      const img = memCtx.getImageData(0, 0, W, H).data;
      const points = [];
      const step = Math.max(4, Math.floor(Math.min(W, H) / 160));
      for (let y = 0; y < H; y += step) {
        for (let x = 0; x < W; x += step) {
          const alpha = img[(y * W + x) * 4 + 3];
          if (alpha > 80) points.push({ x, y });
        }
      }
      targetField = points.length ? points : [];
    }

    function rememberImagePattern(pattern) {
      learnedImageMemory = {
        ...pattern,
        learnedAt: Date.now(),
        expiresAt: Date.now() + IMAGE_MEMORY_TTL_MS
      };
    }

    function getImagePatternMemory() {
      if (!learnedImageMemory) return null;
      if (Date.now() > learnedImageMemory.expiresAt) {
        learnedImageMemory = null;
        return null;
      }
      return learnedImageMemory;
    }

    function buildFieldFromImage(imageBitmap) {
      memCtx.clearRect(0, 0, W, H);
      const fit = Math.min(W / imageBitmap.width, H / imageBitmap.height);
      const drawW = Math.max(1, Math.floor(imageBitmap.width * fit));
      const drawH = Math.max(1, Math.floor(imageBitmap.height * fit));
      const offsetX = Math.floor((W - drawW) * 0.5);
      const offsetY = Math.floor((H - drawH) * 0.5);
      memCtx.drawImage(imageBitmap, offsetX, offsetY, drawW, drawH);

      const img = memCtx.getImageData(0, 0, W, H).data;
      const points = [];
      const step = Math.max(2, Math.floor(Math.min(W, H) / 220));
      for (let y = 0; y < H; y += step) {
        for (let x = 0; x < W; x += step) {
          const idx = (y * W + x) * 4;
          const alpha = img[idx + 3];
          if (alpha < 24) continue;
          const r = img[idx];
          const g = img[idx + 1];
          const b = img[idx + 2];
          const brightness = (r + g + b) / 3;
          if (brightness < 12) continue;
          points.push({ x, y, color: [r, g, b] });
        }
      }

      if (!points.length) return null;

      const average = points.reduce((acc, p) => {
        acc[0] += p.color[0];
        acc[1] += p.color[1];
        acc[2] += p.color[2];
        return acc;
      }, [0, 0, 0]);
      const n = points.length;

      return {
        targetField: points,
        averageColor: average.map(v => Math.round(v / n)),
        structure: { width: imageBitmap.width, height: imageBitmap.height, sampled_points: points.length }
      };
    }

    async function analyzeAttachedImage(file) {
      if (!file || !file.type.startsWith('image/')) return null;
      try {
        const bitmap = await createImageBitmap(file);
        const pattern = buildFieldFromImage(bitmap);
        bitmap.close();
        if (!pattern) return null;
        rememberImagePattern(pattern);
        return pattern;
      } catch (error) {
        console.warn('[AETHERIUM][image-analysis-failed]', error);
        return null;
      }
    }

    async function deliverMessage(message) {
      const traceId = (typeof crypto !== 'undefined' && crypto.randomUUID)
        ? crypto.randomUUID()
        : `trace-${Date.now()}`;
      const sessionId = `homepage-${Date.now()}`;
      const payload = {
        session_id: sessionId,
        model_response: {
          trace_id: traceId,
          reasoning_trace: message,
          intent_vector: {
            category: 'user_message',
            emotional_valence: 0,
            energy_level: 0.5
          },
          particle_control: {
            intent_state: {
              state: 'LISTENING',
              shape: 'orb',
              state_duration_ms: 0,
              transition_reason: 'frontend_message_submit',
              particle_density: 0.4,
              velocity: 0.3,
              turbulence: 0.2,
              cohesion: 0.6,
              flow_direction: 'forward',
              glow_intensity: 0.4,
              flicker: 0.1,
              attractor: 'message_center',
              palette: {
                mode: 'duotone',
                primary: '#6EE7F9',
                secondary: '#A78BFA'
              }
            },
            renderer_controls: {
              base_shape: 'orb',
              chromatic_mode: 'balanced',
              particle_count: 900,
              flow_field: 'laminar',
              shader_uniforms: { cadence_hz: 2.5 },
              runtime_profile: 'standard'
            }
          },
          visual_manifestation: {
            base_shape: 'orb',
            transition_type: 'ease',
            color_palette: {
              primary: '#6EE7F9',
              secondary: '#A78BFA'
            },
            particle_physics: {
              turbulence: 0.2,
              flow_direction: 'forward',
              luminance_mass: 0.4,
              particle_count: 900
            },
            chromatic_mode: 'balanced',
            device_tier: 2
          }
        },
        model_metadata: {
          model_name: 'Tiny Reasoning',
          temperature: 0.4,
          max_tokens: 256
        },
        governor_context: {
          human_override: {
            allow_runtime_governor_bypass: false,
            force_safe_mode: false
          },
          device_capability: {
            supports_motion_sensors: true,
            motion_sensor_permission: 'prompt',
            low_power_mode: false,
            gpu_tier: 2
          }
        }
      };
      try {
        const headers = {
          'Content-Type': 'application/json',
          'X-Model-Provider': window.AETHERIUM_MODEL_PROVIDER || 'frontend-sim',
          'X-Model-Version': window.AETHERIUM_MODEL_VERSION || 'tiny-reasoning-v1'
        };
        if (window.AETHERIUM_API_KEY) {
          headers['X-API-Key'] = window.AETHERIUM_API_KEY;
        }

        const response = await fetch('/api/v1/cognitive/emit', {
          method: 'POST',
          headers,
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return { ok: true };
      } catch (err) {
        console.warn('[AETHERIUM][deliver-fallback]', err);
        return { ok: false };
      }
    }

    async function submitMessage() {
      const text = chatInput.value.trim();
      if (!text && !selectedFile) {
        setStatus('โปรดพิมพ์ข้อความหรือแนบไฟล์ก่อนส่ง');
        markInteraction();
        return;
      }

      sendBtn.disabled = true;
      setTheme(recording ? 'voice' : 'sent');
      setStatus('กำลังส่งข้อความ...');
      markInteraction();

      const imageMemory = getImagePatternMemory();
      if (imageMemory?.targetField?.length) {
        targetField = imageMemory.targetField;
      } else {
        buildMessageField(text || 'FILE');
      }
      const result = await deliverMessage(text || '[file-only]');

      if (result.ok) {
        setStatus('ส่งข้อความสำเร็จ');
      } else {
        setStatus('ส่งผ่าน API ไม่สำเร็จ แสดงผลในโหมดจำลองแทน');
      }

      chatInput.value = '';
      autoResizeTextarea();
      selectedFile = null;
      fileInput.value = '';
      fileChip.classList.remove('active');

      window.setTimeout(() => {
        if (!recording) setTheme('idle');
      }, 1800);
      sendBtn.disabled = false;
    }

    function tick(ts) {
      renderTime = ts * 0.001;
      const cfg = THEMES[theme] || THEMES.idle;

      const idleMs = performance.now() - lastInteractionTime;
      if (idleMs > 5000) fadingOut = true;
      visibilityStrength = clamp(visibilityStrength + (fadingOut ? -0.008 : 0.01), 0.08, 1);
      getImagePatternMemory();

      ctx.fillStyle = `rgba(2, 2, 5, ${cfg.trail})`;
      ctx.fillRect(0, 0, W, H);

      for (let i = 0; i < photons.length; i++) {
        const p = photons[i];
        const target = targetField.length ? targetField[i % targetField.length] : getStandbyTarget(i);

        const dx = target.x - p.x;
        const dy = target.y - p.y;
        const dist = Math.hypot(dx, dy) || 1;
        const force = cfg.force + (dist > 80 ? 0.005 : 0);
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;

        const burst = applyTouchBursts(p);
        p.vx += burst.fx * 0.2;
        p.vy += burst.fy * 0.2;

        p.vx += (Math.random() - 0.5) * cfg.noise;
        p.vy += (Math.random() - 0.5) * cfg.noise;

        p.vx *= 0.91;
        p.vy *= 0.91;
        p.x += p.vx * PARTICLE_SPEED;
        p.y += p.vy * PARTICLE_SPEED;

        if (p.x < -20) p.x = W + 20;
        else if (p.x > W + 20) p.x = -20;
        if (p.y < -20) p.y = H + 20;
        else if (p.y > H + 20) p.y = -20;

        const [r, g, b] = target.color || paletteColor((i / NUM_PHOTONS) + renderTime * 0.01, cfg.palette);
        ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${0.18 + visibilityStrength * 0.72})`;
        ctx.fillRect(p.x, p.y, 1.8, 1.8);
      }

      pruneTouchBursts();
      requestAnimationFrame(tick);
    }

    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async () => {
      selectedFile = fileInput.files?.[0] || null;
      if (selectedFile) {
        fileNameEl.textContent = `${selectedFile.name} · ${Math.max(1, Math.round(selectedFile.size / 1024))} KB`;
        fileChip.classList.add('active');
        const imagePattern = await analyzeAttachedImage(selectedFile);
        if (imagePattern?.targetField?.length) {
          targetField = imagePattern.targetField;
          const [r, g, b] = imagePattern.averageColor;
          markInteraction(`วิเคราะห์ภาพแล้ว · โครงสร้าง ${imagePattern.structure.sampled_points} จุด · สีเฉลี่ย rgb(${r}, ${g}, ${b}) · จำ 1 ชม.`);
        } else {
          markInteraction('แนบไฟล์แล้ว พร้อมส่ง');
        }
      } else {
        fileChip.classList.remove('active');
      }
    });

    fileRemoveBtn.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      fileChip.classList.remove('active');
      learnedImageMemory = null;
      markInteraction('ลบไฟล์แนบแล้ว');
    });

    voiceBtn.addEventListener('click', () => {
      recording = !recording;
      voiceBtn.classList.toggle('recording', recording);
      setTheme(recording ? 'voice' : 'idle');
      markInteraction(recording ? 'โหมดเสียงพร้อมใช้งาน' : 'ปิดโหมดเสียง');
    });

    settingsBtn.addEventListener('click', () => {
      markInteraction('ตั้งค่าจะพร้อมใช้งานในเวอร์ชันถัดไป');
    });

    sendBtn.addEventListener('click', submitMessage);

    chatInput.addEventListener('input', () => {
      autoResizeTextarea();
      markInteraction();
    });

    chatInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        submitMessage();
      }
    });

    display.addEventListener('pointerdown', (event) => {
      addTouchBurst(event.clientX, event.clientY);
      markInteraction('ปลุกแสงแล้ว');
    });

    window.addEventListener('resize', resize);

    resize();
    autoResizeTextarea();
    initPhotons();
    setStatus('SPHERE STANDBY · พิมพ์ข้อความแล้วกดส่งได้ทันที');
    requestAnimationFrame(tick);
  </script>
</body>
</html>
