<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetherium Manifest | Light-Native Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Noto+Sans+Thai:wght@300;400;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #05050a;
            color: #e0e0ff;
            font-family: 'Noto Sans Thai', 'JetBrains Mono', monospace;
        }

        #canvas-container {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .glass-panel {
            background: rgba(10, 10, 20, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(100, 150, 255, 0.15);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(100, 150, 255, 0.8);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(100, 150, 255, 0.3);
            border-radius: 3px;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255, 100, 100, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 100, 100, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 100, 100, 0); }
        }

        .mic-active {
            animation: pulse-ring 1.5s infinite;
            color: #ff6b6b !important;
        }

        .lineage-node {
            transition: all 0.3s ease;
        }

        .lineage-node:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.8);
        }

        .lineage-connector {
            width: 2px;
            background: linear-gradient(to bottom, rgba(100,150,255,0.8), rgba(100,150,255,0.2));
            margin-left: 11px;
            height: 20px;
        }

        #manifestation-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vmin;
            height: 60vmin;
            border-radius: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
            box-shadow: 0 0 50px rgba(100, 200, 255, 0.2);
            background-size: cover;
            background-position: center;
            z-index: 10;
        }
    </style>
</head>
<body class="text-sm">

    <div id="canvas-container"></div>
    <div id="manifestation-overlay"></div>

    <div class="absolute top-4 left-4 z-10 w-80 flex flex-col gap-3">
        <div class="glass-panel p-4">
            <div class="flex justify-between items-center mb-2 pb-2 border-b border-blue-500/20">
                <span class="font-mono font-bold text-blue-400 glow-text">AETHERIUM OS</span>
                <span class="text-xs text-gray-400">ABI: mf-3.30.0</span>
            </div>
            <div class="grid grid-cols-2 gap-2 text-xs font-mono">
                <div class="text-gray-400">STATE</div>
                <div id="sys-state" class="text-right text-emerald-400">IDLE</div>
                <div class="text-gray-400">RESONANCE</div>
                <div id="sys-energy" class="text-right text-blue-300">12.4 AETH</div>
                <div class="text-gray-400">ENTROPY</div>
                <div id="sys-entropy" class="text-right text-purple-300">0.05</div>
            </div>
        </div>

        <div class="glass-panel p-3 h-48 overflow-y-auto font-mono text-[10px] text-gray-300" id="terminal-logs">
            <div class="text-blue-400">&gt; System initialized. Waiting for light intent.</div>
        </div>
    </div>

    <div class="absolute top-4 right-4 z-10 w-72 flex flex-col gap-3 max-h-[90vh]">
        <div class="glass-panel p-4">
            <h3 class="font-mono text-xs text-blue-400 mb-3 border-b border-blue-500/20 pb-1">
                <i class="fas fa-code-branch mr-2"></i>DESIGN LINEAGE
            </h3>
            <div id="lineage-container" class="flex flex-col">
                <div class="flex items-center gap-2 cursor-pointer group" onclick="revertToNode('Genesis')">
                    <div class="w-6 h-6 rounded-full bg-blue-500/50 border border-blue-400 flex items-center justify-center lineage-node">
                        <div class="w-2 h-2 rounded-full bg-white"></div>
                    </div>
                    <span class="text-xs text-gray-300 group-hover:text-white">Genesis (Root)</span>
                </div>
            </div>
        </div>

        <div class="glass-panel p-4 flex-1 flex flex-col hidden" id="scholar-panel">
            <h3 class="font-mono text-xs text-purple-400 mb-2 border-b border-purple-500/20 pb-1 flex justify-between">
                <span><i class="fas fa-globe mr-2"></i>AKASHIC SEARCH</span>
                <span class="animate-pulse">Active</span>
            </h3>
            <div id="scholar-content" class="text-xs text-gray-300 flex-1 overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-20 w-11/12 max-w-3xl">
        <div id="attachment-preview" class="flex gap-2 mb-2 px-2 hidden"></div>

        <div class="glass-panel p-2 flex items-center gap-3">
            <button onclick="triggerAttach()" class="p-3 text-gray-400 hover:text-blue-300 transition-colors rounded-full hover:bg-white/5" title="แนบภาพ/เอกสารอ้างอิง">
                <i class="fas fa-paperclip"></i>
            </button>

            <input
                type="text"
                id="intent-input"
                class="flex-1 bg-transparent border-none outline-none text-white placeholder-gray-500 font-medium px-2"
                placeholder="สนทนากับแสง... (พิมพ์หรือใช้เสียงเพื่อสร้างภาพ, วิดีโอ, หรือค้นหาข้อมูล)"
                onkeypress="handleKeyPress(event)"
            >

            <button id="voice-btn" onclick="toggleVoice()" class="p-3 text-gray-400 hover:text-white transition-all rounded-full hover:bg-white/5" title="สนทนาด้วยเสียง">
                <i class="fas fa-microphone"></i>
            </button>

            <button onclick="emitIntent()" class="bg-blue-600/30 hover:bg-blue-500/50 border border-blue-500/50 text-blue-200 px-6 py-2 rounded-lg font-mono font-bold transition-all flex items-center gap-2">
                EMIT <i class="fas fa-bolt"></i>
            </button>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const particleCount = 15000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i += 3) {
            positions[i] = (Math.random() - 0.5) * 20;
            positions[i + 1] = (Math.random() - 0.5) * 20;
            positions[i + 2] = (Math.random() - 0.5) * 20;

            targetPositions[i] = positions[i];
            targetPositions[i + 1] = positions[i + 1];
            targetPositions[i + 2] = positions[i + 2];

            colors[i] = 0.2;
            colors[i + 1] = 0.5;
            colors[i + 2] = 1.0;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);
        camera.position.z = 15;

        let currentState = 'IDLE';
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            const particlePositions = particleSystem.geometry.attributes.position.array;

            for (let i = 0; i < particleCount * 3; i += 3) {
                if (currentState === 'IDLE') {
                    particleSystem.rotation.y = time * 0.1;
                    particleSystem.rotation.x = time * 0.05;
                } else if (currentState === 'FORMING_IMAGE') {
                    particlePositions[i] += (targetPositions[i] - particlePositions[i]) * 0.05;
                    particlePositions[i + 1] += (targetPositions[i + 1] - particlePositions[i + 1]) * 0.05;
                    particlePositions[i + 2] += (0 - particlePositions[i + 2]) * 0.05;
                    particleSystem.rotation.y = 0;
                    particleSystem.rotation.x = 0;
                } else if (currentState === 'FLOWING_VIDEO') {
                    particlePositions[i] = Math.sin(time + particlePositions[i + 1]) * 5;
                    particlePositions[i + 2] = Math.cos(time + particlePositions[i + 1]) * 5;
                    particlePositions[i + 1] += 0.1;
                    if (particlePositions[i + 1] > 10) particlePositions[i + 1] = -10;
                } else if (currentState === 'SEARCHING') {
                    const scale = 1 + Math.sin(time * 5) * 0.1;
                    particleSystem.scale.set(scale, scale, scale);
                }
            }

            particleSystem.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let isVoiceActive = false;
        let lineageCount = 0;

        function logTerminal(msg, type = 'info') {
            const terminal = document.getElementById('terminal-logs');
            const color = type === 'warn'
                ? 'text-yellow-400'
                : type === 'success'
                    ? 'text-emerald-400'
                    : type === 'system'
                        ? 'text-purple-400'
                        : 'text-blue-300';
            terminal.innerHTML += `<div class="${color} mt-1">&gt; ${msg}</div>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') emitIntent();
        }

        function toggleVoice() {
            const btn = document.getElementById('voice-btn');
            const input = document.getElementById('intent-input');
            isVoiceActive = !isVoiceActive;

            if (isVoiceActive) {
                btn.classList.add('mic-active');
                input.placeholder = 'กำลังฟังเสียงของคุณ...';
                logTerminal('[SENSOR] Audio stream connected. Listening...', 'info');
            } else {
                btn.classList.remove('mic-active');
                input.placeholder = 'สนทนากับแสง... (พิมพ์หรือใช้เสียงเพื่อสร้างภาพ, วิดีโอ, หรือค้นหาข้อมูล)';
                logTerminal('[SENSOR] Audio stream closed.', 'info');
            }
        }

        function triggerAttach() {
            const preview = document.getElementById('attachment-preview');
            preview.classList.remove('hidden');

            const chip = document.createElement('div');
            chip.className = 'glass-panel px-3 py-1 text-xs flex items-center gap-2 text-blue-200';
            chip.innerHTML = '<i class="fas fa-image text-purple-400"></i> reference_style.jpg <i class="fas fa-times cursor-pointer hover:text-red-400" onclick="this.parentElement.remove()"></i>';
            preview.appendChild(chip);

            logTerminal('[VFS] Reference asset attached to envelope.', 'info');
        }

        function emitIntent() {
            const inputField = document.getElementById('intent-input');
            const intent = inputField.value.trim();

            if (!intent && !isVoiceActive) return;

            document.getElementById('sys-state').innerText = 'EVALUATING';
            document.getElementById('sys-state').className = 'text-right text-yellow-400';
            document.getElementById('manifestation-overlay').style.opacity = 0;
            document.getElementById('scholar-panel').classList.add('hidden');

            logTerminal(`[INTENT] Captured: "${intent || 'Voice input'}"`);
            logTerminal('[CONTRACT] Proposing ai_particle_control_contract_v1...', 'system');

            setTimeout(() => {
                logTerminal('[GOVERNOR] Analyzing psychological safety and semantic drift...', 'warn');

                setTimeout(() => {
                    logTerminal('[GOVERNOR] Contract Approved. Signature valid.', 'success');
                    manifestIntent(intent);
                }, 1000);
            }, 500);

            inputField.value = '';
            if (isVoiceActive) toggleVoice();
        }

        function manifestIntent(intent) {
            const lowerIntent = intent.toLowerCase();
            document.getElementById('sys-state').innerText = 'MANIFESTING';
            document.getElementById('sys-state').className = 'text-right text-blue-400';

            addLineageNode(intent);

            if (lowerIntent.includes('ภาพ') || lowerIntent.includes('image')) {
                currentState = 'FORMING_IMAGE';
                logTerminal('[AETH] Coalescing light into static formation...', 'info');

                setTimeout(() => {
                    const overlay = document.getElementById('manifestation-overlay');
                    overlay.style.backgroundImage = 'url("https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop")';
                    overlay.style.opacity = 1;
                    document.getElementById('sys-state').innerText = 'IDLE';
                    document.getElementById('sys-state').className = 'text-right text-emerald-400';
                }, 1500);
            } else if (lowerIntent.includes('วิดีโอ') || lowerIntent.includes('video') || lowerIntent.includes('เคลื่อนไหว')) {
                currentState = 'FLOWING_VIDEO';
                logTerminal('[AETH] Initiating continuous particle flow stream...', 'info');
                document.getElementById('sys-state').innerText = 'STREAMING';
                document.getElementById('sys-state').className = 'text-right text-purple-400';
            } else if (lowerIntent.includes('ค้นหา') || lowerIntent.includes('search') || lowerIntent.includes('คืออะไร')) {
                currentState = 'SEARCHING';
                logTerminal('[SCHOLAR] Routing query to Akashic Data Grid (Web Search)...', 'system');

                setTimeout(() => {
                    document.getElementById('scholar-panel').classList.remove('hidden');
                    const content = document.getElementById('scholar-content');
                    content.innerHTML = `
                        <div class="mb-2"><strong class="text-white search-title"></strong></div>
                        <p class="text-gray-400 leading-relaxed mb-2">
                            ระบบได้ทำการดึงข้อมูลจากแหล่งที่เชื่อถือได้ (อ้างอิงจากฐานข้อมูล Aetherium และ Web Search)...
                            สิ่งนี้คือกระบวนการเชิงโครงสร้างที่แปลงพารามิเตอร์เป็นคลื่นแสง
                        </p>
                        <div class="bg-black/50 p-2 rounded border border-purple-500/30 text-[10px] text-purple-200">
                            <i class="fas fa-link"></i> Source Verified (Governor Trust Score: 0.98)
                        </div>
                    `;
                    content.querySelector('.search-title').textContent = `ผลการค้นหา: ${intent}`;
                    currentState = 'IDLE';
                    document.getElementById('sys-state').innerText = 'IDLE';
                    document.getElementById('sys-state').className = 'text-right text-emerald-400';
                    particleSystem.scale.set(1, 1, 1);
                }, 1500);
            } else {
                currentState = 'IDLE';
                const particleColors = particleSystem.geometry.attributes.color.array;
                const r = Math.random();
                const g = Math.random();
                const b = Math.random();
                for (let i = 0; i < particleCount * 3; i += 3) {
                    particleColors[i] = r;
                    particleColors[i + 1] = g;
                    particleColors[i + 2] = b;
                }
                particleSystem.geometry.attributes.color.needsUpdate = true;

                logTerminal('[AETH] Modulating light frequencies...', 'success');
                document.getElementById('sys-state').innerText = 'IDLE';
                document.getElementById('sys-state').className = 'text-right text-emerald-400';
            }
        }

        function addLineageNode(intentLabel) {
            lineageCount++;
            const container = document.getElementById('lineage-container');

            const connector = document.createElement('div');
            connector.className = 'lineage-connector';
            container.appendChild(connector);

            const node = document.createElement('div');
            node.className = 'flex items-center gap-2 cursor-pointer group mt-1';
            const shortLabel = intentLabel.length > 15 ? `${intentLabel.substring(0, 15)}...` : intentLabel;

            node.innerHTML = `
                <div class="w-6 h-6 rounded-full bg-transparent border border-blue-400 flex items-center justify-center lineage-node" onclick="revertToNode('V.${lineageCount}')">
                    <div class="w-1.5 h-1.5 rounded-full bg-blue-300"></div>
                </div>
                <span class="text-xs text-gray-400 group-hover:text-white transition-colors label-text" onclick="revertToNode('V.${lineageCount}')"></span>
                <i class="fas fa-trash text-gray-600 hover:text-red-400 text-[10px] ml-auto transition-colors" onclick="deleteNode(this)" title="ลบสายวิวัฒนาการนี้"></i>
            `;
            node.querySelector('.label-text').textContent = shortLabel;
            `;
            container.appendChild(node);
        }

        function revertToNode(nodeId) {
            logTerminal(`[LINEAGE] Time-shifting reality to state: ${nodeId}`, 'system');
            document.getElementById('manifestation-overlay').style.opacity = 0;
            document.getElementById('scholar-panel').classList.add('hidden');
            currentState = 'IDLE';
        }

        function deleteNode(element) {
            logTerminal('[LINEAGE] Pruning branch from history.', 'warn');
            const nodeContainer = element.parentElement;
            const connector = nodeContainer.previousElementSibling;
            if (connector && connector.className === 'lineage-connector') connector.remove();
            nodeContainer.remove();
        }
    </script>
</body>
</html>
